apiVersion: apps/v1
kind: Deployment
metadata:
  name: pantry1
  namespace: opsera-pantry1-dev
  labels:
    app: pantry1
    tenant: opsera
    environment: dev
    managed-by: opsera-c2c
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pantry1
  template:
    metadata:
      labels:
        app: pantry1
        tenant: opsera
        environment: dev
    spec:
      serviceAccountName: pantry1-sa
      # RULE 81: imagePullSecrets REQUIRED for private ECR
      imagePullSecrets:
        - name: ecr-pull-secret
      # RULE 156: runAsNonRoot: true REQUIRES explicit runAsUser/runAsGroup
      # nginxinc/nginx-unprivileged uses UID 101 (nginx user)
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: pantry1
          # PLACEHOLDER_ECR_URI - Kustomize image transformer replaces this
          # CI/CD updates overlays/dev/kustomization.yaml with real ECR URI + tag
          image: PLACEHOLDER_ECR_URI
          ports:
            - containerPort: 8080
              name: http
          # RULE 80: imagePullPolicy Always REQUIRED
          imagePullPolicy: Always
          env:
            - name: ENVIRONMENT
              value: "dev"
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: pantry1-config
                  key: APP_NAME
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # RULE 79: SPA health check is / (returns 200 from nginx)
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
