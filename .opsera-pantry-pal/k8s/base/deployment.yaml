apiVersion: apps/v1
kind: Deployment
metadata:
  name: pantry-pal
  labels:
    app: pantry-pal
    tenant: opsera
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pantry-pal
  template:
    metadata:
      labels:
        app: pantry-pal
        tenant: opsera
    spec:
      serviceAccountName: pantry-pal
      containers:
        - name: pantry-pal
          image: pantry-pal:v1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: pantry-pal-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
