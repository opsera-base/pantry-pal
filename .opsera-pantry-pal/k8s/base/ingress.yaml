apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pantry-pal
  # NO namespace field in base (INV-003)
  labels:
    app: pantry-pal
    tenant: opsera
  annotations:
    # RULE 105: BOTH annotation AND spec.ingressClassName required
    kubernetes.io/ingress.class: nginx
    # RULE 83/84/233: NO TLS, NO cert-manager annotations (HTTPS at Ingress Controller level)
spec:
  # RULE 105: ingressClassName required alongside annotation
  ingressClassName: nginx
  rules:
    # Hostname set in overlay kustomization patch (env-specific)
    - host: pantry-pal-dev.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pantry-pal
                port:
                  number: 80
