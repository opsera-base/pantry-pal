# RULE 3: This file goes in /etc/nginx/conf.d/ - server {} block ONLY
# NO pid directive here (pid is main-context only)
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (RULE 79: SPA health check is /)
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
