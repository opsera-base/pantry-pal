# ============================================================
# 2-ci-build-scan-push-pantry1-dev.yaml
# CI/CD Pipeline - Dev Environment - pantry1
# Opsera Code-to-Cloud Enterprise v0.932 - 11-Stage Pipeline
# ============================================================
#
# Required Secrets (3 total - static SPA):
# - AWS_ACCESS_KEY_ID: AWS access key for ECR and EKS
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - GH_PAT: GitHub Personal Access Token (scopes: repo, workflow)
#
# Required Variables (set after first run):
# - GITLEAKS_MODE: "warn" (default) or "block"
# - GRYPE_MODE: "warn" (default) or "block"
#
# Set secrets: gh secret set SECRET_NAME --body "value"
# Set vars:    gh variable set GITLEAKS_MODE --body "warn"
# ============================================================

name: "CI/CD: Dev Environment - pantry1"

# ══════════════════════════════════════════════════════════
# LAYER 1: Concurrency Control (RULE 188)
# cancel-in-progress: false → queue runs, don't cancel
# ══════════════════════════════════════════════════════════
concurrency:
  group: ci-cd-pantry1-dev-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    # ══════════════════════════════════════════════════════
    # LAYER 2: Path Filtering - prevent loops
    # ══════════════════════════════════════════════════════
    paths-ignore:
      - ".opsera-pantry1/k8s/**"          # Manifest updates (skip ci)
      - ".opsera-pantry1/argocd/**"        # ArgoCD app manifests
      - ".github/workflows/**"             # Workflow file updates
      - "**/*.md"                          # Documentation
      - "**/*.disabled"                    # Disabled workflows
      - "**/deployment-landscape-*.yaml"   # Landscape commits

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: ["dev"]

env:
  APP_NAME: pantry1
  TENANT: opsera
  ENV: dev
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO: opsera/pantry1
  ARGOCD_APP: opsera-pantry1-dev
  NAMESPACE: opsera-pantry1-dev

# ══════════════════════════════════════════════════════════════
# STAGE 1: Bootstrap Prerequisites Check
# ══════════════════════════════════════════════════════════════
jobs:
  check-bootstrap:
    name: "✓ Check Bootstrap Prerequisites"
    runs-on: ubuntu-latest
    outputs:
      bootstrap_complete: ${{ steps.check.outputs.complete }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Prerequisites
        id: check
        run: |
          ERRORS=()

          echo "═══════════════════════════════════════════════"
          echo "Verifying Bootstrap Prerequisites for dev"
          echo "═══════════════════════════════════════════════"

          # 1. Check ECR Repository
          echo "1. Checking ECR Repository..."
          if aws ecr describe-repositories \
              --repository-names "${ECR_REPO}" \
              --region ${AWS_REGION} &>/dev/null; then
            echo "   ✓ ECR: ${ECR_REPO}"
          else
            echo "   ✗ ECR repository NOT found"
            ERRORS+=("ECR repository not created")
          fi

          # 2. Check Namespace on SPOKE cluster
          echo "2. Checking Namespace..."
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke
          if kubectl --context spoke get namespace ${NAMESPACE} &>/dev/null; then
            echo "   ✓ Namespace: ${NAMESPACE}"
          else
            echo "   ✗ Namespace NOT found: ${NAMESPACE}"
            ERRORS+=("Namespace not created")
          fi

          # 3. Check ArgoCD Repository on HUB
          echo "3. Checking ArgoCD Repo Registration..."
          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub
          if kubectl --context hub get secret "repo-opsera-base-pantry1" -n argocd &>/dev/null; then
            echo "   ✓ Repo registered with ArgoCD"
          else
            echo "   ✗ Repo NOT registered with ArgoCD"
            ERRORS+=("ArgoCD repository not registered")
          fi

          # 4. Check Spoke Cluster Registration
          echo "4. Checking Spoke Cluster Registration..."
          if kubectl --context hub get secret "cluster-${SPOKE_CLUSTER}" -n argocd &>/dev/null; then
            echo "   ✓ Spoke cluster registered: ${SPOKE_CLUSTER}"
          else
            echo "   ✗ Spoke cluster NOT registered"
            ERRORS+=("Spoke cluster not registered")
          fi

          # Summary
          echo ""
          if [ ${#ERRORS[@]} -eq 0 ]; then
            echo "✅ All bootstrap prerequisites met"
            echo "complete=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Bootstrap prerequisites NOT met:"
            printf '   - %s\n' "${ERRORS[@]}"
            echo ""
            echo "Run: gh workflow run '1-bootstrap-infrastructure-pantry1.yaml'"
            echo "complete=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════
  # STAGE 2: Security Scan - Gitleaks (WARN MODE DEFAULT)
  # ══════════════════════════════════════════════════════════════
  security-scan:
    name: "🔒 Security Scan (Gitleaks)"
    runs-on: ubuntu-latest
    needs: [check-bootstrap]
    if: needs.check-bootstrap.outputs.bootstrap_complete == 'true'

    # RULE 205/224: Use != 'block' to default to warn when variable not set
    # Undefined → true (WARN) | "warn" → true (WARN) | "block" → false (BLOCK)
    continue-on-error: ${{ vars.GITLEAKS_MODE != 'block' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # RULE 224: protect against license issues

      - name: Display Scan Mode
        if: always()
        run: |
          MODE="${{ vars.GITLEAKS_MODE }}"
          if [ "$MODE" = "block" ]; then
            echo "🚫 BLOCK MODE: Secrets detected → Build fails"
          else
            echo "⚠️  WARN MODE: Secrets reported but build continues (default)"
            echo "To enable blocking: gh variable set GITLEAKS_MODE --body 'block'"
          fi

  # ══════════════════════════════════════════════════════════════
  # STAGE 3: Build Docker Image (local only, no push)
  # ══════════════════════════════════════════════════════════════
  build-image:
    name: "🏗️ Build Container Image"
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: always() && needs.check-bootstrap.result == 'success'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Image Tag (RULE 175/206 - Unique Timestamped, No :latest)
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="dev-${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${IMAGE_TAG}"

      - name: Build Docker Image (Local Only)
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"

          echo "Building: ${APP_NAME}:${IMAGE_TAG}"

          # Build with repo root as context, Dockerfile in .opsera-pantry1/
          docker build \
            --platform linux/amd64 \
            --tag ${APP_NAME}:${IMAGE_TAG} \
            --file .opsera-pantry1/Dockerfile \
            .

          echo "✅ Image built locally (not pushed yet)"
          echo "   Image: ${APP_NAME}:${IMAGE_TAG}"

      - name: Save Image as Artifact (RULE 185)
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          docker save ${APP_NAME}:${IMAGE_TAG} -o /tmp/image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ══════════════════════════════════════════════════════════════
  # STAGE 4: Grype Vulnerability Scan (WARN MODE DEFAULT)
  # ══════════════════════════════════════════════════════════════
  grype-scan:
    name: "🔍 Grype Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [build-image]

    # RULE 224: Use != 'block' to default to warn when variable not set
    continue-on-error: ${{ vars.GRYPE_MODE != 'block' }}

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Image (RULE 219 - Dynamic Detection)
        run: |
          ARTIFACT=$(find . -name "*.tar" | head -1)
          if [ -z "$ARTIFACT" ]; then
            echo "❌ No image artifact found"
            exit 1
          fi
          echo "Loading image from: $ARTIFACT"
          docker load -i "$ARTIFACT"

      - name: Run Grype Vulnerability Scan
        uses: anchore/scan-action@v3
        with:
          image: "${{ env.APP_NAME }}:${{ needs.build-image.outputs.image_tag }}"
          severity-cutoff: high
          fail-build: false
          output-format: sarif
        continue-on-error: true  # RULE 224: Scan itself non-blocking

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true  # RULE 224: CRITICAL - don't block if upload fails

      - name: Display Scan Mode
        if: always()
        run: |
          MODE="${{ vars.GRYPE_MODE }}"
          if [ "$MODE" = "block" ]; then
            echo "🚫 BLOCK MODE: Critical vulnerabilities → Build fails"
          else
            echo "⚠️  WARN MODE: Vulnerabilities reported but build continues (default)"
            echo "To enable blocking: gh variable set GRYPE_MODE --body 'block'"
          fi

  # ══════════════════════════════════════════════════════════════
  # STAGE 5: Push to ECR (RULE 232 - always() + build success)
  # ══════════════════════════════════════════════════════════════
  push-to-ecr:
    name: "📤 Push to ECR"
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    # RULE 232: always() + build success check (NOT vars.GRYPE_MODE)
    if: always() && needs.build-image.result == 'success'
    outputs:
      image_tag: ${{ steps.push.outputs.image_tag }}
      ecr_uri: ${{ steps.push.outputs.ecr_uri }}
      full_image: ${{ steps.push.outputs.full_image }}

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Image (RULE 219 - Dynamic Detection)
        run: |
          ARTIFACT=$(find . -name "*.tar" | head -1)
          docker load -i "$ARTIFACT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag, Push, and Capture Outputs
        id: push
        run: |
          IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"

          # RULE 225: Validate IMAGE_TAG not empty
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ IMAGE_TAG is empty - cannot push"
            exit 1
          fi

          # RULE 147: Get AWS_ACCOUNT_ID dynamically (NEVER hardcode)
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          FULL_IMAGE="${ECR_URI}:${IMAGE_TAG}"

          echo "Pushing: ${FULL_IMAGE}"

          # Tag for ECR
          docker tag ${APP_NAME}:${IMAGE_TAG} ${FULL_IMAGE}

          # RULE 206: Push ONLY timestamped tag (NEVER :latest)
          docker push ${FULL_IMAGE}

          echo "✅ Pushed: ${FULL_IMAGE}"

          # RULE 225: Set outputs for downstream jobs
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

  # ══════════════════════════════════════════════════════════════
  # STAGE 6: Update Manifests (Pull-First Pattern - RULE 196)
  # ══════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Kustomize Manifests"
    runs-on: ubuntu-latest
    needs: [push-to-ecr]
    if: success()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Manifests (RULE 196 - Pull FIRST, then Modify)
        run: |
          ECR_URI="${{ needs.push-to-ecr.outputs.ecr_uri }}"
          IMAGE_TAG="${{ needs.push-to-ecr.outputs.image_tag }}"
          KUSTOMIZATION=".opsera-pantry1/k8s/overlays/dev/kustomization.yaml"

          # RULE 225: Validate outputs not empty
          if [ -z "$ECR_URI" ]; then
            echo "❌ ECR_URI is empty - would cause blank newName → ImagePullBackOff"
            exit 1
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ IMAGE_TAG is empty - would cause blank newTag"
            exit 1
          fi

          echo "Updating manifest:"
          echo "  File: ${KUSTOMIZATION}"
          echo "  ECR URI: ${ECR_URI}"
          echo "  Image Tag: ${IMAGE_TAG}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # RULE 196: Pull FIRST (clean working dir), THEN modify files
          echo "Pulling latest changes..."
          git pull --rebase origin ${GITHUB_REF_NAME}
          echo "✓ Pulled latest"

          # NOW safe to modify (no unstaged changes during pull)
          # RULE 131 & 234: Replace ONLY newName (keep name: PLACEHOLDER_ECR_URI)
          sed -i "s|newName: PLACEHOLDER_ECR_URI|newName: ${ECR_URI}|" "${KUSTOMIZATION}"
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" "${KUSTOMIZATION}"

          # RULE 234: CRITICAL VALIDATION
          echo "🔍 Validating kustomization.yaml..."

          # CHECK 1: name field must still be PLACEHOLDER_ECR_URI
          if ! grep -q "name: PLACEHOLDER_ECR_URI" "${KUSTOMIZATION}"; then
            echo "❌ FAIL: name field was replaced (breaks kustomize matching)"
            cat "${KUSTOMIZATION}"
            exit 1
          fi

          # CHECK 2: newName must have actual ECR URI
          if grep -q "newName: PLACEHOLDER_ECR_URI" "${KUSTOMIZATION}"; then
            echo "❌ FAIL: newName still has placeholder"
            exit 1
          fi

          # CHECK 3: newTag must not be empty
          if grep -qE "newTag: *$|newTag:$" "${KUSTOMIZATION}"; then
            echo "❌ FAIL: newTag is empty"
            exit 1
          fi

          echo "✅ Validation passed"
          echo "Updated kustomization.yaml:"
          cat "${KUSTOMIZATION}"

          git add "${KUSTOMIZATION}"

          # RULE 209: Idempotent - skip commit if no changes
          if git diff --cached --quiet; then
            echo "✅ Manifest already up-to-date (desired state achieved)"
            exit 0
          fi

          # LAYER 3: [skip ci] prevents loop triggers
          git commit -m "chore(deploy): update dev image to ${IMAGE_TAG} [skip ci]"

          # RULE 202: Retry loop for push conflicts
          for i in 1 2 3; do
            echo "Push attempt ${i}/3..."
            if git push origin ${GITHUB_REF_NAME}; then
              echo "✅ Manifest pushed"
              break
            fi
            echo "⚠️ Push failed, retrying..."
            git pull --rebase origin ${GITHUB_REF_NAME}
            sleep 2
            if [ $i -eq 3 ]; then
              echo "❌ Failed to push after 3 attempts"
              exit 1
            fi
          done

  # ══════════════════════════════════════════════════════════════
  # STAGE 7: Create/Update ArgoCD Application (MANDATORY - RULE 199)
  # ══════════════════════════════════════════════════════════════
  create-argocd-app:
    name: "🔧 Create/Update ArgoCD App (HUB)"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: success()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to HUB Cluster
        run: |
          # RULE 189: Use --alias hub
          aws eks update-kubeconfig \
            --name ${HUB_CLUSTER} \
            --region ${AWS_REGION} \
            --alias hub
          echo "✅ Context: HUB cluster (ArgoCD)"

      - name: Apply ArgoCD Application (Idempotent)
        run: |
          # RULE 213: ArgoCD app created WITHOUT auto-sync
          # Stage 9 will perform first controlled sync after hard refresh
          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${ARGOCD_APP}
            namespace: argocd
            labels:
              tenant: ${TENANT}
              app: ${APP_NAME}
              environment: ${ENV}
              managed-by: opsera-c2c
          spec:
            project: default
            source:
              repoURL: https://github.com/opsera-base/pantry-pal.git
              targetRevision: ${GITHUB_REF_NAME}
              path: .opsera-pantry1/k8s/overlays/dev
            destination:
              name: ${SPOKE_CLUSTER}
              namespace: ${NAMESPACE}
            syncPolicy:
              automated: null
              syncOptions:
                - CreateNamespace=true
                - Replace=true
              retry:
                limit: 3
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m
          EOF

          echo "✅ ArgoCD Application applied: ${ARGOCD_APP}"
          kubectl --context hub get application ${ARGOCD_APP} -n argocd \
            -o jsonpath='Status: sync={.status.sync.status}, health={.status.health.status}' || true

  # ══════════════════════════════════════════════════════════════
  # STAGE 8: Refresh ECR Pull Secret (SPOKE) - RULE 204
  # MUST run BEFORE ArgoCD sync (prevents ImagePullBackOff)
  # ══════════════════════════════════════════════════════════════
  refresh-ecr-secret:
    name: "🔐 Refresh ECR Secret (SPOKE)"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    if: success()

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to SPOKE Cluster
        run: |
          # RULE 189: Use --alias spoke
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke
          echo "✅ Context: SPOKE cluster"

      - name: Wait for Namespace
        run: |
          for i in {1..30}; do
            if kubectl --context spoke get namespace ${NAMESPACE} &>/dev/null; then
              echo "✓ Namespace ready: ${NAMESPACE}"
              break
            fi
            echo "Waiting for namespace... ($i/30)"
            sleep 5
          done

      - name: Refresh ECR Pull Secret (RULE 197 - variable, not stdin)
        run: |
          # RULE 147: Get AWS_ACCOUNT_ID dynamically
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          # RULE 197: Store password in variable (NOT --docker-password-stdin)
          ECR_PASS=$(aws ecr get-login-password --region ${AWS_REGION})

          # RULE 187: dry-run + apply pattern (idempotent)
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" \
            --docker-username=AWS \
            --docker-password="${ECR_PASS}" \
            --namespace="${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          echo "✅ ECR pull secret refreshed (valid 12 hours)"

  # ══════════════════════════════════════════════════════════════
  # STAGE 9: Sync and Deploy (HUB) - Combined Stage
  # ══════════════════════════════════════════════════════════════
  sync-and-deploy:
    name: "🚀 Sync and Deploy (ArgoCD HUB)"
    runs-on: ubuntu-latest
    needs: [refresh-ecr-secret]
    if: success()

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to HUB Cluster
        run: |
          aws eks update-kubeconfig \
            --name ${HUB_CLUSTER} \
            --region ${AWS_REGION} \
            --alias hub
          echo "✅ Context: HUB cluster (ArgoCD Sync)"

      - name: Step 1 - Hard Refresh (Clear Git Cache)
        run: |
          echo "Triggering hard refresh: ${ARGOCD_APP}"

          kubectl --context hub annotate application ${ARGOCD_APP} \
            -n argocd \
            argocd.argoproj.io/refresh=hard \
            --overwrite

          echo "✅ Hard refresh triggered"
          sleep 5

      - name: Step 2 - Trigger Sync
        run: |
          echo "Triggering sync: ${ARGOCD_APP}"

          kubectl --context hub patch application ${ARGOCD_APP} \
            -n argocd \
            --type merge \
            -p '{"operation":{"sync":{"prune":true,"syncOptions":["Replace=true"]}}}'

          echo "✅ Sync triggered"

      - name: Step 3 - Wait for Sync (RULE 223 - Poll status fields)
        run: |
          MAX_WAIT=300
          INTERVAL=10
          ELAPSED=0

          echo "Waiting for sync to complete..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            SYNC=$(kubectl --context hub get application ${ARGOCD_APP} \
              -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$(kubectl --context hub get application ${ARGOCD_APP} \
              -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            OPERATION=$(kubectl --context hub get application ${ARGOCD_APP} \
              -n argocd -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "None")

            echo "[${ELAPSED}s/${MAX_WAIT}s] Sync: ${SYNC} | Health: ${HEALTH} | Op: ${OPERATION}"

            if [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ Application Synced and Healthy"
              exit 0
            fi

            if [ "$OPERATION" = "Failed" ]; then
              echo "❌ Sync operation failed"
              kubectl --context hub get application ${ARGOCD_APP} -n argocd -o yaml | tail -40
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "⚠️  Sync timeout (${MAX_WAIT}s) - check ArgoCD UI"
          echo "ArgoCD: https://argocd-usw2.agent.opsera.dev"
          exit 0  # Non-blocking timeout - verify stage catches issues

  # ══════════════════════════════════════════════════════════════
  # STAGE 10: Verify Deployment (SPOKE)
  # ══════════════════════════════════════════════════════════════
  verify-deployment:
    name: "✅ Verify Deployment (SPOKE)"
    runs-on: ubuntu-latest
    needs: [sync-and-deploy]
    if: success()

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to SPOKE Cluster
        run: |
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke
          echo "✅ Context: SPOKE cluster (Verification)"

      - name: Check Pod Status
        run: |
          echo "Pod status in ${NAMESPACE}:"
          kubectl --context spoke get pods -n ${NAMESPACE} -o wide

      - name: Wait for Deployment Rollout
        run: |
          echo "Waiting for rollout: deployment/${APP_NAME}"

          # Wait up to 3 minutes for rollout
          if kubectl --context spoke rollout status \
              deployment/${APP_NAME} \
              -n ${NAMESPACE} \
              --timeout=180s; then
            echo "✅ Deployment rolled out successfully"
          else
            echo "⚠️  Rollout timeout - checking pod status..."
            kubectl --context spoke get pods -n ${NAMESPACE}
            kubectl --context spoke describe deployment ${APP_NAME} -n ${NAMESPACE}
          fi

      - name: Health Check (RULE 168 - Port-Forward Pattern)
        run: |
          # RULE 168: Use port-forward (not exec into container)
          kubectl --context spoke port-forward \
            -n ${NAMESPACE} \
            deployment/${APP_NAME} \
            8081:8080 &
          PF_PID=$!
          sleep 5

          # RULE 79: SPA health check returns 200 from /
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8081/ \
            --max-time 10 || echo "000")

          kill $PF_PID 2>/dev/null || true

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed (HTTP ${HTTP_CODE})"
          else
            echo "⚠️  Health check returned HTTP ${HTTP_CODE}"
            echo "Application may still be starting up"
          fi

      - name: Show Ingress Info
        run: |
          echo "Ingress:"
          kubectl --context spoke get ingress -n ${NAMESPACE} || true
          echo ""
          echo "Application URL: https://pantry1-dev.agent.opsera.dev"

      - name: Deployment Summary
        run: |
          IMAGE_TAG="${{ needs.push-to-ecr.outputs.image_tag || 'unknown' }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ✅ pantry1 Deployed to Dev

          | Field | Value |
          |-------|-------|
          | Environment | dev |
          | Namespace | ${NAMESPACE} |
          | Image Tag | \`${IMAGE_TAG}\` |
          | ArgoCD App | ${ARGOCD_APP} |
          | URL | https://pantry1-dev.agent.opsera.dev |
          | ArgoCD | https://argocd-usw2.agent.opsera.dev |
          EOF

  # ══════════════════════════════════════════════════════════════
  # STAGE 11: Trigger Deployment Landscape (RULE 180/201 - MANDATORY)
  # ══════════════════════════════════════════════════════════════
  trigger-landscape:
    name: "📊 Generate Deployment Landscape"
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: success()

    steps:
      - name: Trigger Landscape Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'deployment-landscape-pantry1.yaml',
                ref: context.ref || 'main',
                inputs: {
                  environment: 'dev'
                }
              });
              console.log('✅ Deployment landscape triggered for dev');
            } catch (error) {
              console.log('⚠️ Could not trigger landscape workflow:', error.message);
              console.log('Non-blocking - deployment succeeded');
            }
