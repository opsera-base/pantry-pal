# ============================================================
# 1-bootstrap-infrastructure-pantry1.yaml
# ONE-TIME infrastructure setup for pantry1
# Run ONCE before any CI/CD workflows
# RULE 127: Bootstrap MUST complete before CI/CD can run
# ============================================================
#
# Required Secrets:
# - AWS_ACCESS_KEY_ID: AWS access key for ECR and EKS
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - GH_PAT: GitHub Personal Access Token (scopes: repo, workflow)
#
# Set secrets: gh secret set SECRET_NAME --body "value"
# Run bootstrap: gh workflow run "1-bootstrap-infrastructure-pantry1.yaml"
# ============================================================

name: "Bootstrap: pantry1 Infrastructure"

on:
  workflow_dispatch:

env:
  APP_NAME: pantry1
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO: opsera/pantry1

jobs:
  # ══════════════════════════════════════════════════════════
  # JOB 1: Setup ECR Repository (IDEMPOTENT)
  # ══════════════════════════════════════════════════════════
  setup-ecr:
    name: "📦 Setup ECR Repository"
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository (Idempotent)
        run: |
          echo "Checking ECR repository: ${ECR_REPO}"

          if aws ecr describe-repositories \
              --repository-names "${ECR_REPO}" \
              --region ${AWS_REGION} &>/dev/null; then
            echo "✓ ECR repository already exists: ${ECR_REPO}"
          else
            echo "Creating ECR repository: ${ECR_REPO}"
            aws ecr create-repository \
              --repository-name "${ECR_REPO}" \
              --image-tag-mutability IMMUTABLE \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${TENANT} \
                     Key=app,Value=${APP_NAME} \
                     Key=managed-by,Value=opsera-c2c \
              --region ${AWS_REGION}
            echo "✓ ECR repository created: ${ECR_REPO}"
          fi

          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR URI: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"

  # ══════════════════════════════════════════════════════════
  # JOB 2: Register Repository with ArgoCD Hub (IDEMPOTENT)
  # ══════════════════════════════════════════════════════════
  register-repo-argocd:
    name: "🔗 Register Repo with ArgoCD"
    runs-on: ubuntu-latest
    needs: [setup-ecr]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl (HUB cluster)
        run: |
          # RULE 189: Use --alias for kubeconfig context names
          aws eks update-kubeconfig \
            --name ${HUB_CLUSTER} \
            --region ${AWS_REGION} \
            --alias hub
          echo "✓ Connected to HUB cluster: ${HUB_CLUSTER}"

      - name: Register Repository with ArgoCD (Idempotent)
        run: |
          REPO_SECRET_NAME="repo-opsera-base-pantry1"

          # RULE 186: Check-and-skip pattern
          if kubectl --context hub get secret "$REPO_SECRET_NAME" -n argocd &>/dev/null; then
            echo "✓ Repository already registered with ArgoCD - skipping"
            exit 0
          fi

          echo "Registering repository with ArgoCD..."
          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${REPO_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: https://github.com/opsera-base/pantry-pal.git
            password: ${{ secrets.GH_PAT }}
            username: git
          EOF

          echo "✓ Repository registered with ArgoCD"

  # ══════════════════════════════════════════════════════════
  # JOB 3: Register Spoke Cluster with ArgoCD (IDEMPOTENT)
  # ══════════════════════════════════════════════════════════
  register-spoke-cluster:
    name: "🔌 Register Spoke Cluster"
    runs-on: ubuntu-latest
    needs: [register-repo-argocd]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubeconfig (HUB + SPOKE)
        run: |
          # RULE 189: Use --alias for context names
          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke
          echo "✓ Kubeconfig configured for hub and spoke"

      - name: Register Spoke Cluster (Idempotent)
        run: |
          # RULE 176: MUST use --context hub (argocd namespace is on hub, not spoke)
          CLUSTER_SECRET_NAME="cluster-${SPOKE_CLUSTER}"

          if kubectl --context hub get secret "$CLUSTER_SECRET_NAME" -n argocd &>/dev/null; then
            echo "✓ Spoke cluster already registered: ${SPOKE_CLUSTER} - skipping"
            exit 0
          fi

          echo "Registering spoke cluster with ArgoCD..."

          # Get spoke cluster details from AWS API
          SPOKE_SERVER=$(aws eks describe-cluster \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --query 'cluster.endpoint' \
            --output text)

          SPOKE_CA=$(aws eks describe-cluster \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --query 'cluster.certificateAuthority.data' \
            --output text)

          if [ -z "$SPOKE_SERVER" ] || [ "$SPOKE_SERVER" = "None" ]; then
            echo "❌ Failed to get spoke cluster endpoint for ${SPOKE_CLUSTER}"
            exit 1
          fi

          # Create argocd-manager service account on SPOKE (RULE 62)
          kubectl --context spoke create serviceaccount argocd-manager \
            -n kube-system --dry-run=client -o yaml | kubectl --context spoke apply -f -

          kubectl --context spoke create clusterrolebinding argocd-manager \
            --clusterrole=cluster-admin \
            --serviceaccount=kube-system:argocd-manager \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          # Create token (K8s 1.24+ compatible)
          TOKEN=$(kubectl --context spoke create token argocd-manager \
            -n kube-system --duration=87600h 2>/dev/null || \
            kubectl --context spoke get secret -n kube-system \
              $(kubectl --context spoke get sa argocd-manager -n kube-system \
                -o jsonpath='{.secrets[0].name}') \
              -o jsonpath='{.data.token}' | base64 -d)

          # Create cluster secret on HUB
          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${CLUSTER_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${SPOKE_CLUSTER}"
            server: "${SPOKE_SERVER}"
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF

          echo "✓ Spoke cluster registered with ArgoCD: ${SPOKE_CLUSTER}"

  # ══════════════════════════════════════════════════════════
  # JOB 4: Create Folder Structure (IDEMPOTENT)
  # ══════════════════════════════════════════════════════════
  create-folder-structure:
    name: "📁 Create Folder Structure"
    runs-on: ubuntu-latest
    needs: [setup-ecr]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Create Folder Structure (RULE 177 - mkdir before verify)
        run: |
          # RULE 183: TENANT defaults to "opsera"
          TENANT=${TENANT:-opsera}

          # Step 1: Create directories (ALWAYS before verifying)
          mkdir -p .${TENANT}-${APP_NAME}/k8s/base
          mkdir -p .${TENANT}-${APP_NAME}/k8s/overlays/dev
          mkdir -p .${TENANT}-${APP_NAME}/argocd/dev

          echo "✓ Folder structure ensured (tenant: ${TENANT})"

          # Step 2: Verify structure
          if test -d .${TENANT}-${APP_NAME}/k8s/base && \
             test -d .${TENANT}-${APP_NAME}/k8s/overlays/dev && \
             test -d .${TENANT}-${APP_NAME}/argocd/dev; then
            echo "✓ Folder structure verified"
          else
            echo "✗ Folder structure verification failed"
            exit 1
          fi

          echo "✅ Bootstrap folder structure ready"

  # ══════════════════════════════════════════════════════════
  # JOB 5: Create Namespaces (IDEMPOTENT)
  # ══════════════════════════════════════════════════════════
  create-namespaces:
    name: "🗂️ Create Namespaces"
    runs-on: ubuntu-latest
    needs: [register-spoke-cluster]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl (SPOKE cluster)
        run: |
          # RULE 189: Use --alias spoke
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke
          echo "✓ Connected to SPOKE cluster: ${SPOKE_CLUSTER}"

      - name: Create Namespace (Idempotent)
        run: |
          NAMESPACE="${TENANT}-${APP_NAME}-dev"

          if kubectl --context spoke get namespace ${NAMESPACE} &>/dev/null; then
            echo "✓ Namespace already exists: ${NAMESPACE}"
          else
            kubectl --context spoke create namespace ${NAMESPACE}
            kubectl --context spoke label namespace ${NAMESPACE} \
              tenant=${TENANT} \
              app=${APP_NAME} \
              environment=dev \
              managed-by=opsera-c2c
            echo "✓ Namespace created: ${NAMESPACE}"
          fi

  # ══════════════════════════════════════════════════════════
  # JOB 6: Create Service Accounts (IDEMPOTENT)
  # ══════════════════════════════════════════════════════════
  create-service-accounts:
    name: "👤 Create Service Accounts"
    runs-on: ubuntu-latest
    needs: [create-namespaces]

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl (SPOKE cluster)
        run: |
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke

      - name: Create Service Account (Idempotent)
        run: |
          NAMESPACE="${TENANT}-${APP_NAME}-dev"
          SA_NAME="${APP_NAME}-sa"

          kubectl create serviceaccount ${SA_NAME} \
            -n ${NAMESPACE} \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          echo "✓ Service account ready: ${SA_NAME} in ${NAMESPACE}"

      - name: Bootstrap Complete
        run: |
          echo "════════════════════════════════════════════════════"
          echo "✅ Bootstrap Complete for pantry1!"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "Resources created:"
          echo "  ✓ ECR Repository: opsera/pantry1"
          echo "  ✓ ArgoCD Repo Registration"
          echo "  ✓ Spoke Cluster Registration"
          echo "  ✓ Namespace: opsera-pantry1-dev"
          echo "  ✓ Service Account: pantry1-sa"
          echo ""
          echo "Next steps:"
          echo "  1. Push code to 'main' branch to trigger CI/CD"
          echo "  2. OR manually trigger:"
          echo "     gh workflow run '2-ci-build-scan-push-pantry1-dev.yaml'"
          echo ""
          echo "Monitor at: https://argocd-usw2.agent.opsera.dev"
          echo "════════════════════════════════════════════════════"
