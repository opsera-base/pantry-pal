name: "CI/CD pantry-pal Dev"

on:
  push:
    branches: [main]
    paths:
      - '.opsera-pantry-pal/**'
      - '!.opsera-pantry-pal/k8s/**'
      - '!.opsera-pantry-pal/argocd/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/cicd-pantry-pal-dev.yaml'
  workflow_dispatch:
    inputs:
      TENANT:
        description: "Tenant name"
        required: false
        default: "opsera"
      APP_NAME:
        description: "Application name"
        required: false
        default: "pantry-pal"
      ENVIRONMENT:
        description: "Target environment"
        required: false
        default: "dev"
      grype_mode:
        description: "Grype scan mode"
        required: false
        default: "warn"
        type: choice
        options:
          - warn
          - block

env:
  APP_NAME: pantry-pal
  TENANT: opsera
  ENV: dev
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  check-bootstrap-prerequisites:
    name: "Stage 1 - Prerequisites Check"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      aws_account_id: ${{ steps.account.outputs.id }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Verify ECR Repository
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT

          aws ecr describe-repositories \
            --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" > /dev/null 2>&1 || {
            echo "ECR repository not found. Run bootstrap workflow first."
            exit 1
          }
          echo "ECR repository verified: ${ECR_URI}"

  security-scan:
    name: "Stage 2 - Security Scan"
    needs: [check-bootstrap-prerequisites]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Gitleaks Result
        run: |
          echo "Gitleaks scan complete (warn-only mode)"

  build-image:
    name: "Stage 3 - Build Image"
    needs: [check-bootstrap-prerequisites]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.tag }}
      image_uri: ${{ steps.build.outputs.uri }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        id: build
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          ECR_URI="${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}"

          echo "Building image: ${ECR_URI}:${IMAGE_TAG}"

          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t "${ECR_URI}:${IMAGE_TAG}" \
            -t local-scan:latest \
            .

          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "uri=${ECR_URI}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Build complete: ${ECR_URI}:${IMAGE_TAG}"

  grype-scan:
    name: "Stage 4 - Grype Vulnerability Scan"
    needs: [build-image]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan Image
        run: |
          MODE="${{ inputs.grype_mode || 'warn' }}"
          echo "Scanning with mode: ${MODE}"

          grype local-scan:latest \
            --output table \
            --fail-on critical 2>&1 || true

          echo "Grype scan complete (${MODE} mode)"

  push-to-ecr:
    name: "Stage 5 - Push to ECR"
    needs: [check-bootstrap-prerequisites, build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            ${{ needs.check-bootstrap-prerequisites.outputs.aws_account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Push Image to ECR
        run: |
          docker push "${{ needs.build-image.outputs.image_uri }}"
          echo "Pushed: ${{ needs.build-image.outputs.image_uri }}"

  update-manifests:
    name: "Stage 6 - Update Manifests"
    needs: [check-bootstrap-prerequisites, build-image, push-to-ecr]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kustomization Image Tag
        run: |
          ECR_URI="${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}"
          IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"
          OVERLAY_PATH=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}"

          cd "${OVERLAY_PATH}"

          # Replace PLACEHOLDER_ECR_URI on first run
          if grep -q "PLACEHOLDER_ECR_URI" kustomization.yaml; then
            sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" kustomization.yaml
            echo "Replaced PLACEHOLDER_ECR_URI with ${ECR_URI}"
          fi

          # Update image reference
          cat > kustomization.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: ${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}
          resources:
            - ../../base
          images:
            - name: pantry-pal
              newName: "${ECR_URI}"
              newTag: "${IMAGE_TAG}"
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' kustomization.yaml

          echo "Updated kustomization to ${IMAGE_TAG}"
          cat kustomization.yaml

      - name: Validate Kustomize Build
        run: |
          OVERLAY_PATH=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}"

          if ! kubectl kustomize "$OVERLAY_PATH" > /dev/null 2>&1; then
            echo "Kustomize build validation failed"
            kubectl kustomize "$OVERLAY_PATH"
            exit 1
          fi
          echo "Kustomize build validation passed"

      - name: Commit and Push Manifest Changes
        run: |
          IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "deploy: update pantry-pal dev to ${IMAGE_TAG}"

            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              if git push origin ${{ github.ref_name }}; then
                echo "Push successful"
                break
              fi
              echo "Push failed, retrying with rebase... (attempt $i/$MAX_RETRIES)"
              git pull --rebase origin ${{ github.ref_name }}
            done
          fi

  create-argocd-app:
    name: "Stage 7 - Create ArgoCD Application"
    needs: [update-manifests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Application - Idempotent
        run: |
          APP_MANIFEST=".opsera-${{ env.APP_NAME }}/argocd/${{ env.ENV }}/application.yaml"

          if [ ! -f "$APP_MANIFEST" ]; then
            echo "ArgoCD application manifest not found: $APP_MANIFEST"
            exit 1
          fi

          echo "Applying ArgoCD application manifest: $APP_MANIFEST"
          kubectl apply -f "$APP_MANIFEST"

          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          if kubectl get app ${APP_FULL_NAME} -n argocd &>/dev/null; then
            echo "ArgoCD application exists: ${APP_FULL_NAME}"
          else
            echo "ArgoCD application not found after apply: ${APP_FULL_NAME}"
            exit 1
          fi

  refresh-ecr-secret:
    name: "Stage 8 - Refresh ECR Secret"
    needs: [check-bootstrap-prerequisites, create-argocd-app]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Refresh ECR Pull Secret
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          ACCOUNT_ID="${{ needs.check-bootstrap-prerequisites.outputs.aws_account_id }}"
          ECR_SERVER="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

          kubectl create secret docker-registry ecr-pull-secret \
            --namespace="${NAMESPACE}" \
            --docker-server="${ECR_SERVER}" \
            --docker-username=AWS \
            --docker-password="${ECR_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "ECR pull secret refreshed in ${NAMESPACE}"

  sync-and-deploy:
    name: "Stage 9 - ArgoCD Sync and Deploy"
    needs: [create-argocd-app]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: ArgoCD Hard Refresh
        run: |
          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          kubectl patch app ${APP_FULL_NAME} -n argocd --type merge \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'

          echo "Triggered hard refresh for ${APP_FULL_NAME}"
          sleep 5

      - name: Trigger ArgoCD Sync
        run: |
          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          kubectl patch app ${APP_FULL_NAME} -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"HEAD"}}}'

          echo "Triggered sync for ${APP_FULL_NAME}"

      - name: Wait for Sync Complete
        run: |
          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          for i in $(seq 1 60); do
            HEALTH=$(kubectl get app ${APP_FULL_NAME} -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            OPERATION=$(kubectl get app ${APP_FULL_NAME} -n argocd \
              -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "Unknown")

            echo "[$i/60] Health: ${HEALTH}, Operation: ${OPERATION}"

            if [ "$OPERATION" = "Succeeded" ]; then
              echo "ArgoCD sync operation completed successfully"
              exit 0
            fi

            if [ "$OPERATION" = "Failed" ] || [ "$OPERATION" = "Error" ]; then
              echo "ArgoCD sync failed"
              kubectl get app ${APP_FULL_NAME} -n argocd -o yaml
              exit 1
            fi

            sleep 10
          done

          echo "Sync did not complete in 10 minutes"
          exit 1

  verify-deployment:
    name: "Stage 10 - Verify Deployment"
    needs: [sync-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for Deployment to Exist
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          for i in $(seq 1 60); do
            if kubectl get deployment ${{ env.APP_NAME }} -n ${NAMESPACE} &>/dev/null; then
              echo "Deployment exists"
              break
            fi
            echo "Waiting for ArgoCD to create deployment... ($i/60)"
            sleep 5
          done

          if ! kubectl get deployment ${{ env.APP_NAME }} -n ${NAMESPACE} &>/dev/null; then
            echo "Deployment not found after 5 minutes"
            exit 1
          fi

      - name: Wait for Deployment Ready
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          kubectl wait --for=condition=available --timeout=300s \
            deployment/${{ env.APP_NAME }} -n ${NAMESPACE}
          echo "Deployment is available"

      - name: Verify Pods Running
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          kubectl get pods -n ${NAMESPACE} -o wide

          RUNNING=$(kubectl get pods -n ${NAMESPACE} \
            --field-selector=status.phase=Running -o name | wc -l)

          if [ "$RUNNING" -eq 0 ]; then
            echo "No pods are running"
            exit 1
          fi

          echo "${RUNNING} pod(s) running"
          echo ""
          echo "Application URL: https://pantry-pal-dev.agent.opsera.dev"

  deployment-landscape:
    name: "Stage 11 - Deployment Landscape"
    needs: [verify-deployment]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "=== DEPLOYMENT COMPLETE ==="
          echo ""
          echo "Application:  ${{ env.APP_NAME }}"
          echo "Tenant:       ${{ env.TENANT }}"
          echo "Environment:  ${{ env.ENV }}"
          echo "Region:       ${{ env.AWS_REGION }}"
          echo "Cluster:      ${{ env.SPOKE_CLUSTER }}"
          echo "Namespace:    ${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          echo "URL:          https://pantry-pal-dev.agent.opsera.dev"
          echo ""
          echo "==========================="
