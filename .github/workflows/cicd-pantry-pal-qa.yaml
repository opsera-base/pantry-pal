name: "CI/CD pantry-pal QA"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. abc1234-20260101120000)"
        required: true
      grype_mode:
        description: "Grype scan mode"
        required: false
        default: "warn"
        type: choice
        options:
          - warn
          - block

env:
  APP_NAME: pantry-pal
  TENANT: opsera
  ENV: qa
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  check-bootstrap-prerequisites:
    name: "Stage 1 - Prerequisites Check"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      aws_account_id: ${{ steps.account.outputs.id }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Verify ECR Repository
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT

          aws ecr describe-repositories \
            --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" > /dev/null 2>&1 || {
            echo "ECR repository not found. Run bootstrap workflow first."
            exit 1
          }
          echo "ECR repository verified: ${ECR_URI}"

      - name: Notify Slack - Deployment Started
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\":rocket: *${{ env.APP_NAME }}* QA deployment started\nImage: \`${{ inputs.image_tag }}\`\nTriggered by: ${{ github.actor }}\"}" || true

  update-manifests:
    name: "Stage 2 - Update Manifests"
    needs: [check-bootstrap-prerequisites]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update Kustomization Image Tag
        run: |
          ECR_URI="${{ needs.check-bootstrap-prerequisites.outputs.ecr_uri }}"
          IMAGE_TAG="${{ inputs.image_tag }}"
          OVERLAY_PATH=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}"

          cd "${OVERLAY_PATH}"

          # Replace PLACEHOLDER_ECR_URI on first run
          if grep -q "PLACEHOLDER_ECR_URI" kustomization.yaml; then
            sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" kustomization.yaml
            echo "Replaced PLACEHOLDER_ECR_URI with ${ECR_URI}"
          fi

          cat > kustomization.yaml <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: ${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}
          resources:
            - serviceaccount.yaml
            - configmap.yaml
            - rollout-canary.yaml
            - service-stable.yaml
            - service-canary.yaml
            - ingress.yaml
            - analysis-template.yaml
          images:
            - name: pantry-pal
              newName: "${ECR_URI}"
              newTag: "${IMAGE_TAG}"
          EOF

          sed -i 's/^          //' kustomization.yaml

          echo "Updated kustomization to ${IMAGE_TAG}"
          cat kustomization.yaml

      - name: Validate Kustomize Build
        run: |
          OVERLAY_PATH=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}"

          if ! kubectl kustomize "$OVERLAY_PATH" > /dev/null 2>&1; then
            echo "Kustomize build validation failed"
            kubectl kustomize "$OVERLAY_PATH"
            exit 1
          fi
          echo "Kustomize build validation passed"

      - name: Commit and Push Manifest Changes
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "deploy: update pantry-pal qa to ${IMAGE_TAG}"

            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              if git push origin main; then
                echo "Push successful"
                break
              fi
              echo "Push failed, retrying with rebase... (attempt $i/$MAX_RETRIES)"
              git pull --rebase origin main
            done
          fi

  create-argocd-app:
    name: "Stage 3 - Create ArgoCD Application"
    needs: [update-manifests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Application - Idempotent
        run: |
          APP_MANIFEST=".opsera-${{ env.APP_NAME }}/argocd/${{ env.ENV }}/application.yaml"

          if [ ! -f "$APP_MANIFEST" ]; then
            echo "ArgoCD application manifest not found: $APP_MANIFEST"
            exit 1
          fi

          echo "Applying ArgoCD application manifest: $APP_MANIFEST"
          kubectl apply -f "$APP_MANIFEST"

          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          if kubectl get app ${APP_FULL_NAME} -n argocd &>/dev/null; then
            echo "ArgoCD application exists: ${APP_FULL_NAME}"
          else
            echo "ArgoCD application not found after apply: ${APP_FULL_NAME}"
            exit 1
          fi

  refresh-ecr-secret:
    name: "Stage 4 - Refresh ECR Secret"
    needs: [check-bootstrap-prerequisites, create-argocd-app]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Refresh ECR Pull Secret
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          ACCOUNT_ID="${{ needs.check-bootstrap-prerequisites.outputs.aws_account_id }}"
          ECR_SERVER="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

          kubectl create secret docker-registry ecr-pull-secret \
            --namespace="${NAMESPACE}" \
            --docker-server="${ECR_SERVER}" \
            --docker-username=AWS \
            --docker-password="${ECR_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "ECR pull secret refreshed in ${NAMESPACE}"

      - name: Create NewRelic Profile Secret
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          kubectl create secret generic newrelic-profile \
            --namespace="${NAMESPACE}" \
            --from-literal=api-key="${{ secrets.NEWRELIC_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "NewRelic profile secret refreshed in ${NAMESPACE}"

  sync-and-deploy:
    name: "Stage 5 - ArgoCD Sync and Deploy"
    needs: [create-argocd-app]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: ArgoCD Hard Refresh
        run: |
          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          kubectl patch app ${APP_FULL_NAME} -n argocd --type merge \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'

          echo "Triggered hard refresh for ${APP_FULL_NAME}"
          sleep 5

      - name: Trigger ArgoCD Sync
        run: |
          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          kubectl patch app ${APP_FULL_NAME} -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"HEAD"}}}'

          echo "Triggered sync for ${APP_FULL_NAME}"

      - name: Wait for Sync Complete
        run: |
          APP_FULL_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          for i in $(seq 1 60); do
            HEALTH=$(kubectl get app ${APP_FULL_NAME} -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            OPERATION=$(kubectl get app ${APP_FULL_NAME} -n argocd \
              -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "Unknown")

            echo "[$i/60] Health: ${HEALTH}, Operation: ${OPERATION}"

            if [ "$OPERATION" = "Succeeded" ]; then
              echo "ArgoCD sync operation completed successfully"
              exit 0
            fi

            if [ "$OPERATION" = "Failed" ] || [ "$OPERATION" = "Error" ]; then
              echo "ArgoCD sync failed"
              kubectl get app ${APP_FULL_NAME} -n argocd -o yaml
              exit 1
            fi

            sleep 10
          done

          echo "Sync did not complete in 10 minutes"
          exit 1

  verify-deployment:
    name: "Stage 6 - Verify Rollout"
    needs: [sync-and-deploy, refresh-ecr-secret]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Install Argo Rollouts Plugin
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts-linux-amd64
          sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for Rollout to Exist
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          for i in $(seq 1 30); do
            if kubectl-argo-rollouts get rollout ${{ env.APP_NAME }} -n ${NAMESPACE} &>/dev/null; then
              echo "Rollout resource found after ${i} attempts"
              break
            fi
            echo "Waiting for ArgoCD to create rollout... ($i/30)"
            sleep 10
          done

          if ! kubectl-argo-rollouts get rollout ${{ env.APP_NAME }} -n ${NAMESPACE} &>/dev/null; then
            echo "Rollout not found after 5 minutes"
            exit 1
          fi

      - name: Wait for Canary to Complete
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"

          for i in $(seq 1 60); do
            STATUS=$(kubectl-argo-rollouts get rollout ${{ env.APP_NAME }} -n ${NAMESPACE} \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")

            echo "[$i/60] Canary status: ${STATUS}"

            if [ "$STATUS" = "Healthy" ]; then
              echo "Canary rollout completed successfully"
              break
            fi

            if [ "$STATUS" = "Degraded" ]; then
              echo "Canary rollout degraded - auto-rollback triggered"
              kubectl-argo-rollouts get rollout ${{ env.APP_NAME }} -n ${NAMESPACE}
              exit 1
            fi

            sleep 10
          done

      - name: Show Rollout Status
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          kubectl-argo-rollouts get rollout ${{ env.APP_NAME }} -n ${NAMESPACE}
          kubectl get pods -n ${NAMESPACE} -o wide
          echo ""
          echo "Application URL: https://pantry-pal-qa.agent.opsera.dev"

  deployment-landscape:
    name: "Stage 7 - Deployment Landscape"
    needs: [verify-deployment]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Deployment Summary
        run: |
          STATUS="${{ needs.verify-deployment.result }}"
          echo "=== QA DEPLOYMENT COMPLETE ==="
          echo ""
          echo "Application:  ${{ env.APP_NAME }}"
          echo "Tenant:       ${{ env.TENANT }}"
          echo "Environment:  ${{ env.ENV }}"
          echo "Image Tag:    ${{ inputs.image_tag }}"
          echo "Strategy:     Canary (20% → 50% → 100%)"
          echo "Monitoring:   Prometheus + NewRelic"
          echo "Status:       ${STATUS}"
          echo "URL:          https://pantry-pal-qa.agent.opsera.dev"
          echo ""
          echo "=============================="

      - name: Notify Slack - Deployment Result
        if: always()
        run: |
          STATUS="${{ needs.verify-deployment.result }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            MESSAGE="QA deployment *succeeded*"
          else
            EMOJI=":x:"
            MESSAGE="QA deployment *failed*"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"${EMOJI} *${{ env.APP_NAME }}* ${MESSAGE}\nImage: \`${{ inputs.image_tag }}\`\nURL: https://pantry-pal-qa.agent.opsera.dev\"}" || true
